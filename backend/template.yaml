AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  VocabFlow backend — accounts + per-user progress sync, fully on AWS.
  Cognito (email/password + optional Google via Hosted UI) for auth, and
  API Gateway (HTTP API) -> Lambda -> DynamoDB for data. No Supabase.

Parameters:
  AllowOrigin:
    Type: String
    Default: "*"
    Description: Allowed CORS origin for the API, e.g. https://llnysllf.github.io
  AppUrl:
    Type: String
    Default: "https://llnysllf.github.io/VocabFlow/"
    Description: >
      The app's URL — used as the OAuth callback/logout URL for Hosted UI
      (Google sign-in). Must match where the page is actually served.
  CognitoDomainPrefix:
    Type: String
    Default: "vocabflow-auth"
    Description: >
      Hosted UI domain prefix (globally unique per region). The Hosted UI lives
      at https://<prefix>.auth.<region>.amazoncognito.com — change if taken.
  GoogleClientId:
    Type: String
    Default: ""
    Description: Google OAuth client ID (leave blank to skip Google sign-in).
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Google OAuth client secret (leave blank to skip Google sign-in).

Conditions:
  HasGoogle: !Not [!Equals [!Ref GoogleClientId, ""]]

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256

Resources:
  # ---------- Auth (Cognito) ----------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: vocabflow-users
      UsernameAttributes: [email]
      AutoVerifiedAttributes: [email]
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpFunction.Arn

  PreSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: presignup.handler
      CodeUri: src/

  PreSignUpInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PreSignUpFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref UserPool
      Domain: !Ref CognitoDomainPrefix

  GoogleIdP:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Condition: HasGoogle
    Properties:
      UserPoolId: !Ref UserPool
      ProviderName: Google
      ProviderType: Google
      ProviderDetails:
        client_id: !Ref GoogleClientId
        client_secret: !Ref GoogleClientSecret
        authorize_scopes: "openid email profile"
      AttributeMapping:
        email: email

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: vocabflow-web
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH            # email/password (SRP)
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED
      # Hosted UI / OAuth (used by the Google button, PKCE code flow)
      SupportedIdentityProviders: !If
        - HasGoogle
        - [COGNITO, !Ref GoogleIdP]      # !Ref returns "Google" AND orders after the IdP
        - [COGNITO]
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows: [code]
      AllowedOAuthScopes: [openid, email, profile]
      CallbackURLs:
        - !Ref AppUrl
        - !Sub "${AppUrl}index.html"
      LogoutURLs:
        - !Ref AppUrl

  # ---------- Data (DynamoDB + API) ----------
  ProgressTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowOrigin
        AllowMethods:
          - GET
          - PUT
          - OPTIONS
        AllowHeaders:
          - authorization
          - content-type

  ProgressFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: src/
      Environment:
        Variables:
          TABLE_NAME: !Ref ProgressTable
          ALLOW_ORIGIN: !Ref AllowOrigin
          JWT_ISSUER: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
          JWT_AUDIENCE: !Ref UserPoolClient
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProgressTable
      Events:
        GetProgress:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: GET
            Path: /progress
        PutProgress:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: PUT
            Path: /progress

Outputs:
  ApiUrl:
    Description: Put in js/config.js as API_BASE_URL.
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  Region:
    Description: Put in js/config.js as COGNITO_REGION.
    Value: !Ref AWS::Region
  UserPoolId:
    Description: Put in js/config.js as COGNITO_USER_POOL_ID.
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Put in js/config.js as COGNITO_CLIENT_ID.
    Value: !Ref UserPoolClient
  CognitoDomain:
    Description: Put in js/config.js as COGNITO_DOMAIN (needed for Google sign-in).
    Value: !Sub "https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
  GoogleCallbackUrl:
    Description: Add this as an "Authorized redirect URI" on your Google OAuth client.
    Value: !Sub "https://${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com/oauth2/idpresponse"
