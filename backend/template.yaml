AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  VocabFlow backend — accounts + per-user progress sync, fully on AWS.
  Cognito (auth) + API Gateway (HTTP API) -> Lambda -> DynamoDB (data).
  No Supabase. Each /progress request is authenticated by verifying the
  Cognito-issued JWT; the token's `sub` keys the user's row.

Parameters:
  AllowOrigin:
    Type: String
    Default: "*"
    Description: Allowed CORS origin, e.g. https://llnysllf.github.io

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256

Resources:
  # ---------- Auth (Cognito) ----------
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: vocabflow-users
      UsernameAttributes: [email]          # sign in with email
      AutoVerifiedAttributes: [email]      # marked verified by the trigger below
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: false
          RequireLowercase: false
          RequireNumbers: false
          RequireSymbols: false
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpFunction.Arn

  PreSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: presignup.handler
      CodeUri: src/
      # Auto-confirms new users (no emailed code) and marks their email verified,
      # so sign-up -> sign-in is immediate, matching the previous UX.

  PreSignUpInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PreSignUpFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt UserPool.Arn

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPool
      ClientName: vocabflow-web
      GenerateSecret: false                # public SPA client — no secret
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH              # secure password auth (SRP)
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  # ---------- Data (DynamoDB + API) ----------
  ProgressTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST          # scales to zero; no fixed cost
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref AllowOrigin
        AllowMethods:
          - GET
          - PUT
          - OPTIONS
        AllowHeaders:
          - authorization
          - content-type

  ProgressFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: src/
      Environment:
        Variables:
          TABLE_NAME: !Ref ProgressTable
          ALLOW_ORIGIN: !Ref AllowOrigin
          JWT_ISSUER: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
          JWT_AUDIENCE: !Ref UserPoolClient
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProgressTable
      Events:
        GetProgress:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: GET
            Path: /progress
        PutProgress:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Method: PUT
            Path: /progress

Outputs:
  ApiUrl:
    Description: Put in js/config.js as API_BASE_URL.
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  Region:
    Description: Put in js/config.js as COGNITO_REGION.
    Value: !Ref AWS::Region
  UserPoolId:
    Description: Put in js/config.js as COGNITO_USER_POOL_ID.
    Value: !Ref UserPool
  UserPoolClientId:
    Description: Put in js/config.js as COGNITO_CLIENT_ID.
    Value: !Ref UserPoolClient
